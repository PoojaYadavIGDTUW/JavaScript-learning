<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Todo App</title>

<style>
/* =========================
   ROOT VARIABLES (THEME)
========================= */
:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #222;
  --accent: #4f46e5;
}

.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
}

/* =========================
   GLOBAL STYLES
========================= */
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* =========================
   HEADER
========================= */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  margin: 0;
}

/* =========================
   INPUT AREA
========================= */
.input-group {
  display: flex;
  gap: 10px;
  margin: 20px 0;
  flex-wrap: wrap;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  flex: 1;
}

button {
  padding: 10px 15px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* =========================
   TASK LIST
========================= */
.task {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: fadeIn 0.3s ease;
}

.task.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

/* PRIORITY COLORS */
.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }

/* =========================
   FILTERS
========================= */
.filters {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.filter-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* =========================
   ANIMATIONS
========================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:600px) {
  .input-group {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Todo App</h1>
    <button onclick="toggleTheme()">🌙</button>
  </div>

  <!-- INPUT -->
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Enter task...">
    <input type="date" id="dueDate">
    <select id="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="addTask()">Add</button>
  </div>

  <!-- TASK LIST -->
  <div id="taskList"></div>

  <!-- FOOTER -->
  <div class="filters">
    <div>
      <button class="filter-btn" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('active')">Active</button>
      <button class="filter-btn" onclick="setFilter('completed')">Completed</button>
    </div>
    <span id="counter"></span>
  </div>

</div>

<script>
/* =========================
   DATA & STATE
========================= */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

/* =========================
   SAVE TO LOCAL STORAGE
========================= */
function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

/* =========================
   ADD TASK
========================= */
function addTask() {
  const text = document.getElementById("taskInput").value;
  const due = document.getElementById("dueDate").value;
  const priority = document.getElementById("priority").value;

  if (!text) return;

  tasks.push({
    id: Date.now(),
    text,
    due,
    priority,
    completed: false
  });

  saveTasks();
  renderTasks();

  document.getElementById("taskInput").value = "";
}

/* =========================
   DELETE TASK
========================= */
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

/* =========================
   TOGGLE COMPLETE
========================= */
function toggleTask(id) {
  tasks = tasks.map(t =>
    t.id === id ? {...t, completed: !t.completed} : t
  );
  saveTasks();
  renderTasks();
}

/* =========================
   EDIT TASK
========================= */
function editTask(id) {
  const newText = prompt("Edit task:");
  if (!newText) return;

  tasks = tasks.map(t =>
    t.id === id ? {...t, text: newText} : t
  );

  saveTasks();
  renderTasks();
}

/* =========================
   FILTER
========================= */
function setFilter(f) {
  filter = f;
  renderTasks();
}

/* =========================
   RENDER TASKS
========================= */
function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let filtered = tasks.filter(t => {
    if (filter === "active") return !t.completed;
    if (filter === "completed") return t.completed;
    return true;
  });

  filtered.forEach(task => {
    const div = document.createElement("div");
    div.className = `task ${task.priority} ${task.completed ? "completed" : ""}`;

    div.innerHTML = `
      <div>
        <strong>${task.text}</strong><br>
        <small>${task.due || ""}</small>
      </div>
      <div>
        <button onclick="toggleTask(${task.id})">✔</button>
        <button onclick="editTask(${task.id})">✏</button>
        <button onclick="deleteTask(${task.id})">🗑</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateCounter();
}

/* =========================
   COUNTER
========================= */
function updateCounter() {
  const completed = tasks.filter(t => t.completed).length;
  document.getElementById("counter").innerText =
    `${completed} of ${tasks.length} completed`;
}

/* =========================
   THEME TOGGLE
========================= */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

/* INITIAL RENDER */
renderTasks();
</script>

</body>
</html>
